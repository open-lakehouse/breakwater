name: CI

on:
  merge_group:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# Least privilege by default; jobs opt into more if they ever need it.
permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # Detect whether a PR touches anything that affects the build. A docs-only
  # change can't break compilation, so the expensive jobs gate on this. On push
  # to main / merge_group there is no PR diff to filter, so `code` is 'true'.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - '!**/*.md'
              - '!docs/**'
              - '!LICENSE'
              - '!.gitignore'
            proto:
              - 'proto/**'
              - 'buf.yaml'
              - 'crates/cedar-oci/buf.gen.yaml'
              - 'crates/cedar-oci/src/gen/**'

  fmt:
    name: fmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
          components: rustfmt
      - name: Format
        run: cargo fmt --all --check

  # Catch dangling dependencies (declared in Cargo.toml but never used).
  machete:
    name: machete
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: bnjbvr/cargo-machete@ac30a525c0a8d163a92d727b3ff079ee3f6ecb08 # v0.9.2
        with:
          args: crates

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
          components: clippy
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "31.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Verify the workspace builds on its declared MSRV floor (workspace
  # rust-version). The other jobs run on a recent pinned stable.
  msrv:
    name: msrv
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.91"
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "31.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: msrv
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Build on MSRV
        run: cargo build --workspace --all-features

  # The generated proto stubs under crates/cedar-oci/src/gen/ are committed (so
  # the workspace builds without a codegen step). Regenerate here and fail if
  # the committed output drifts from the .proto sources.
  proto-check:
    name: proto-check
    needs: changes
    if: ${{ needs.changes.outputs.proto == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
          components: rustfmt
      # Run from the crate dir so buf.gen.yaml's relative `inputs`/`out` resolve;
      # the generated file is `include!`d, so format it directly with rustfmt
      # (cargo fmt does not descend into include! targets).
      - name: Regenerate proto code
        working-directory: crates/cedar-oci
        run: |
          buf generate --template buf.gen.yaml
          rustfmt --edition 2024 src/gen/hydrofoil/policy/hydrofoil.policy.rs
      - name: Check committed output is up to date
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated proto code is stale. Regenerate it (see crates/cedar-oci/buf.gen.yaml) and commit the result."
            git diff --stat
            exit 1
          fi

  test:
    name: test
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "31.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2.82.1
        with:
          tool: cargo-nextest
      - name: Test
        run: cargo nextest run --workspace --all-features
      - name: Doctests
        if: ${{ !cancelled() }}
        run: cargo test --workspace --all-features --doc

  # docs.rs builds these crates; keep the doc build warning-free.
  doc:
    name: doc
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.96"
      - name: Install protoc
        uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3.0.0
        with:
          version: "31.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          shared-key: ci
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Doc
        run: cargo doc --no-deps --workspace --all-features

  # Single roll-up status. Because some jobs are conditionally skipped on
  # docs-only PRs, make THIS the one required check in branch protection.
  ci:
    name: ci
    if: ${{ always() }}
    needs: [fmt, machete, clippy, msrv, proto-check, test, doc]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Verify required jobs succeeded or were skipped
        run: |
          for r in \
            "fmt:${{ needs.fmt.result }}" \
            "machete:${{ needs.machete.result }}" \
            "clippy:${{ needs.clippy.result }}" \
            "msrv:${{ needs.msrv.result }}" \
            "proto-check:${{ needs.proto-check.result }}" \
            "test:${{ needs.test.result }}" \
            "doc:${{ needs.doc.result }}"; do
            name="${r%%:*}"; result="${r##*:}"
            echo "$name -> $result"
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "::error::required job '$name' did not succeed ($result)"
              exit 1
            fi
          done
          echo "All required jobs passed (or were skipped)."
